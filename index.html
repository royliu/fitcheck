/* ---------- Seed Data ---------- */
/* Closet starts empty — items are added by capturing them in the Camera tab. */
let _id = 0;
const uid = () => `item_${_id++}`;
const mk = (name, category, color, fav = false, wash = false) =>
  ({ id: uid(), name, category, color, fav, wash });

const SEED = [];
const SEED_TRASH = [];

/* ================= REAL CLOTHING DETECTION (in-browser, onnxruntime-web) =================
   Fashion object detector: yainage90/fashion-object-detection (Conditional DETR),
   converted to ONNX (int8 ~44MB), run fully in the browser via onnxruntime-web.
   Detects whole garments as objects -> works on worn outfits AND items laid out /
   held up / partially occluded (no full-body shot required). */
// The 167MB model is split into <100MB parts (GitHub's per-file limit) and
// stitched back together at load time.
const DETECTOR_PARTS = ["./fashion-detector.onnx.part0", "./fashion-detector.onnx.part1"];
const DETECTOR_TOTAL = 174424033;
const DETECTOR_URL = (typeof window !== "undefined" && window.FITCHECK_MODEL_URL) || "./fashion-detector.onnx";
const DET_LABELS = ["bag", "bottom", "dress", "hat", "outer", "shoes", "top"];
const DET_MAP = {
  bag:    { category: "Accessories", sub: "Bags",                noun: "Bag" },
  bottom: { category: "Bottoms",                                 noun: "Bottoms" },
  dress:  { category: "Tops",                                    noun: "Dress" },
  hat:    { category: "Accessories", sub: "Headwear & Neckwear", noun: "Hat" },
  outer:  { category: "Outerwear",                               noun: "Outerwear" },
  shoes:  { category: "Shoes",                                   noun: "Shoes" },
  top:    { category: "Tops",                                    noun: "Top" },
};
const DET_MEAN = [0.485, 0.456, 0.406], DET_STD = [0.229, 0.224, 0.225];
const DET_SHORTEST = 640, DET_LONGEST = 1333, DET_THRESHOLD = 0.3;

// --- model-load progress (so the scan screen can show a real % bar) ---
let _dlDet = 0, _dlClip = 0, _dlSeg = 0;
const _mpSubs = new Set();
function modelProgress(){ return 0.5 * _dlDet + 0.2 * _dlClip + 0.3 * _dlSeg; }
function emitModelProgress(){ const p = modelProgress(); _mpSubs.forEach((f) => f(p)); }
function onModelProgress(fn){ _mpSubs.add(fn); fn(modelProgress()); return () => _mpSubs.delete(fn); }

let _ort = null, _ortSession = null;
async function getDetector(onStage) {
  if (!_ort) {
    onStage && onStage("Loading AI model…");
    _ort = await import("onnxruntime-web");
    _ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/";
  }
  if (!_ortSession) {
    onStage && onStage("Loading AI model…");
    let buf = null;
    try {
      let received = 0; const chunks = [];
      for (const url of DETECTOR_PARTS) {
        const resp = await fetch(url);
        if (resp.body && resp.body.getReader) {
          const reader = resp.body.getReader();
          for (;;) {
            const { done, value } = await reader.read();
            if (done) break;
            chunks.push(value); received += value.length;
            _dlDet = Math.min(1, received / DETECTOR_TOTAL); emitModelProgress();
          }
        } else {
          const ab = new Uint8Array(await resp.arrayBuffer());
          chunks.push(ab); received += ab.length;
          _dlDet = Math.min(1, received / DETECTOR_TOTAL); emitModelProgress();
        }
      }
      const u8 = new Uint8Array(received); let off = 0;
      for (const c of chunks) { u8.set(c, off); off += c.length; }
      buf = u8.buffer;
      _dlDet = 1; emitModelProgress();
    } catch (e) { buf = null; }
    _ortSession = await _ort.InferenceSession.create(buf || DETECTOR_URL, { executionProviders: ["wasm"] });
    _dlDet = 1; emitModelProgress();
  }
  return _ortSession;
}

function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }
function iou(a, b) {
  const x1 = Math.max(a[0], b[0]), y1 = Math.max(a[1], b[1]), x2 = Math.min(a[2], b[2]), y2 = Math.min(a[3], b[3]);
  const inter = Math.max(0, x2 - x1) * Math.max(0, y2 - y1);
  const ua = (a[2]-a[0])*(a[3]-a[1]) + (b[2]-b[0])*(b[3]-b[1]) - inter;
  return ua > 0 ? inter / ua : 0;
}

/* --- detailed garment labelling (CLIP zero-shot; optional 2nd model) --- */
const DETAIL_CANDIDATES = {
  top:["t-shirt","tank top","crop top","blouse","button-up shirt","knit sweater","hoodie","sweatshirt","cardigan","polo shirt","camisole","turtleneck"],
  bottom:["denim jeans","skinny jeans","wide-leg jeans","trousers","leggings","sweatpants","cargo pants","mini skirt","midi skirt","pleated skirt","denim shorts","shorts"],
  dress:["mini dress","midi dress","maxi dress","slip dress","shirt dress","sundress","knit dress","bodycon dress"],
  outer:["denim jacket","leather jacket","blazer","bomber jacket","puffer jacket","trench coat","wool coat","cardigan","windbreaker"],
  shoes:["sneakers","boots","ankle boots","heels","sandals","loafers","ballet flats","mary janes","mules","socks"],
  bag:["shoulder bag","tote bag","crossbody bag","backpack","clutch","handbag","mini bag"],
  hat:["beanie","baseball cap","bucket hat","beret","wide-brim hat"],
};
/* Layering pieces that should live in Outerwear even when the detector boxed them
   as a "top". */
const OUTER_TYPES = new Set(["hoodie","sweatshirt","knit sweater","sweater","cardigan"]);
let _clipMod=null,_clip=null;
async function getClassifier(onStage){
  if(!_clipMod){ onStage&&onStage("Loading detail model…"); _clipMod=await import("@huggingface/transformers"); _clipMod.env.allowLocalModels=false; }
  if(!_clip){
    _clip=await _clipMod.pipeline("zero-shot-image-classification","Xenova/clip-vit-base-patch32",{
      progress_callback:(x)=>{ if(x&&x.status==="progress"&&x.total){ _dlClip=Math.min(1,(x.loaded||0)/x.total); emitModelProgress(); } },
    });
    _dlClip=1; emitModelProgress();
  }
  return _clip;
}
function titleCase(s){ return s.replace(/\b\w/g,c=>c.toUpperCase()); }
/* Refine each item's noun into a detailed garment type. Best-effort: keeps the
   coarse label if the detail model is unsure or fails to load. */
async function refineLabels(items, onStage){
  try{
    const clf=await getClassifier(onStage);
    onStage&&onStage("Naming your pieces…");
    const tmpls=["a photo of a {}","a close-up photo of a {}, a type of clothing"];
    for(const it of items){
      const cand=DETAIL_CANDIDATES[it.detLabel]; if(!cand) continue;
      const src=it.clfPhoto||it.photo;                 // flattened cutout when available
      // Ensemble a couple of prompt templates and average — steadier on lookalikes
      // like t-shirt vs polo than a single prompt.
      const agg=new Map();
      for(const t of tmpls){
        const out=await clf(src, cand, { hypothesis_template:t });
        for(const r of out) agg.set(r.label,(agg.get(r.label)||0)+r.score);
      }
      let lbl=null,sum=-1; for(const [l,s] of agg){ if(s>sum){ sum=s; lbl=l; } }
      if(lbl && sum/tmpls.length>0.17){
        it.noun=titleCase(lbl); it.name=it.color+" "+it.noun;
        // Socks aren't a detector class — when the detail model reads a "shoes"
        // box as socks, file it under Accessories › Socks instead of Shoes.
        if(lbl==="socks"){ it.category="Accessories"; it.subcategory="Socks"; }
        // Hoodies / sweaters / cardigans belong in Outerwear, not Tops.
        if(OUTER_TYPES.has(lbl)){ it.category="Outerwear"; it.subcategory=null; }
      }
    }
  }catch(e){ /* keep coarse labels */ }
  return items;
}

/* --- garment analysis (clothes-parsing segmentation) ---
   Uses a per-garment mask to read an accurate colour (garment pixels only, no
   skin/background bleed) and to give the detail classifier a clean view. The mask
   is NOT used for the displayed photo — that stays a full rectangular crop so
   nothing gets cut out where hair/arms overlap the clothes. Best-effort. */
const SEG_CLASSES = {
  top:["Upper-clothes"], outer:["Upper-clothes"], bottom:["Skirt","Pants"],
  dress:["Dress"], shoes:["Left-shoe","Right-shoe"], bag:["Bag"], hat:["Hat"],
};
let _segMod=null,_parser=null;
async function getParser(onStage){
  if(!_segMod){ _segMod=await import("@huggingface/transformers"); _segMod.env.allowLocalModels=false; }
  if(!_parser){
    onStage&&onStage("Loading photo model…");
    _parser=await _segMod.pipeline("image-segmentation","Xenova/segformer_b2_clothes",{
      progress_callback:(x)=>{ if(x&&x.status==="progress"&&x.total){ _dlSeg=Math.min(1,(x.loaded||0)/x.total); emitModelProgress(); } },
    });
    _dlSeg=1; emitModelProgress();
  }
  return _parser;
}
async function cutoutItems(items, sc, W, H, onStage){
  try{
    if(!items.length) return;
    const parser=await getParser(onStage);
    onStage&&onStage("Polishing photos…");
    const ps=Math.min(1, 1024/Math.max(W,H));           // parse at <=1024 for speed
    const pw=Math.round(W*ps), ph=Math.round(H*ps);
    const pcv=document.createElement("canvas"); pcv.width=pw; pcv.height=ph;
    pcv.getContext("2d").drawImage(sc,0,0,pw,ph);
    const segs=await parser(pcv.toDataURL("image/jpeg",0.92));
    const masks=new Map();
    for(const s of segs){ if(s&&s.label&&s.mask&&s.mask.data) masks.set(s.label,s.mask.data); }
    const mW=pw, mH=ph;
    for(const it of items){
      const cls=SEG_CLASSES[it.detLabel]; if(!cls) continue;
      const layers=cls.map((c)=>masks.get(c)).filter(Boolean);
      if(!layers.length) continue;                       // garment class not segmented → keep crop
      const [x1,y1,x2,y2]=it.bbox;
      const exX=Math.round((x2-x1)*0.06), exY=Math.round((y2-y1)*0.06);
      const bx1=Math.max(0,x1-exX), by1=Math.max(0,y1-exY), bx2=Math.min(W,x2+exX), by2=Math.min(H,y2+exY);
      const cw=bx2-bx1, ch=by2-by1; if(cw<6||ch<6) continue;
      const up=Math.min(2, Math.max(1, 560/Math.max(cw,ch)));   // upscale small crops for quality
      const ow=Math.round(cw*up), oh=Math.round(ch*up);
      const oc=document.createElement("canvas"); oc.width=ow; oc.height=oh;
      const ox=oc.getContext("2d"); ox.imageSmoothingEnabled=true; ox.imageSmoothingQuality="high";
      ox.drawImage(sc, bx1,by1,cw,ch, 0,0,ow,oh);
      const idata=ox.getImageData(0,0,ow,oh); const px=idata.data;
      let nz=0,minx=ow,miny=oh,maxx=0,maxy=0;
      const cbuckets=new Map();                          // dominant garment colour (opaque pixels only)
      for(let yy=0; yy<oh; yy++){
        const sy=by1+(yy/oh)*ch; const my=Math.min(mH-1,Math.round(sy*ps));
        for(let xx=0; xx<ow; xx++){
          const sx=bx1+(xx/ow)*cw; const mx=Math.min(mW-1,Math.round(sx*ps));
          let m=0; for(const L of layers){ const v=L[my*mW+mx]; if(v>m)m=v; }
          const a=m<90?0:(m>160?255:Math.round((m-90)/70*255));  // soft edge
          const o4=(yy*ow+xx)*4; px[o4+3]=Math.round(px[o4+3]*(a/255));
          if(a>140){                                     // confidently-garment pixel
            nz++; if(xx<minx)minx=xx; if(xx>maxx)maxx=xx; if(yy<miny)miny=yy; if(yy>maxy)maxy=yy;
            const k=(px[o4]>>4)+"_"+(px[o4+1]>>4)+"_"+(px[o4+2]>>4);
            const e=cbuckets.get(k)||[0,0,0,0]; e[0]+=px[o4];e[1]+=px[o4+1];e[2]+=px[o4+2];e[3]++; cbuckets.set(k,e);
          }
        }
      }
      if(nz < ow*oh*0.02) continue;                      // too little matched → keep crop
      // Re-name the colour from the clean garment pixels (no skin/background bleed).
      let cb=null; for(const e of cbuckets.values()){ if(!cb||e[3]>cb[3]) cb=e; }
      if(cb){ const col=classifyColor(cb[0]/cb[3],cb[1]/cb[3],cb[2]/cb[3]); if(col){ it.color=col; it.name=col+" "+it.noun; } }
      // White-flatten the masked garment ONLY for the detail classifier. The photo
      // SHOWN to the user stays the full rectangular crop — no holey cut-outs.
      ox.putImageData(idata,0,0);
      const wc=document.createElement("canvas"); wc.width=ow; wc.height=oh;
      const wx=wc.getContext("2d"); wx.fillStyle="#fff"; wx.fillRect(0,0,ow,oh); wx.drawImage(oc,0,0);
      it.clfPhoto=wc.toDataURL("image/jpeg",0.92);
    }
  }catch(e){ /* keep rectangular crops */ }
}

const COLOR_PALETTE = [
  ["Black",25,25,25],["White",245,245,245],["Gray",130,130,130],["Navy",30,40,80],
  ["Blue",50,90,200],["Light Blue",125,175,220],["Red",200,45,45],["Pink",232,150,175],
  ["Light Pink",236,200,205],["Mauve",190,150,152],["Orange",230,140,50],["Yellow",232,210,85],
  ["Green",60,140,85],["Olive",110,120,70],["Brown",120,80,50],["Tan",200,170,130],
  ["Beige",225,210,185],["Cream",242,232,212],["Purple",135,85,165],
];
function nearestColor(r,g,b){let n="Neutral",d=1e9;for(const[name,pr,pg,pb]of COLOR_PALETTE){const e=(r-pr)**2+(g-pg)**2+(b-pb)**2;if(e<d){d=e;n=name;}}return n;}

/* --- lighting-robust color naming --- */
function rgb2hsv(r,g,b){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b),dd=mx-mn;let h=0;if(dd){if(mx===r)h=((g-b)/dd)%6;else if(mx===g)h=(b-r)/dd+2;else h=(r-g)/dd+4;h*=60;if(h<0)h+=360;}return[h,mx?dd/mx:0,mx];}
/* Gray-world white-balance gains from the whole image, gently clamped, to undo
   warm/cool lighting casts before naming a garment's color. */
function whiteBalanceGains(srcCanvas){
  const c=document.createElement("canvas");c.width=32;c.height=32;
  c.getContext("2d").drawImage(srcCanvas,0,0,32,32);
  const d=c.getContext("2d").getImageData(0,0,32,32).data;let r=0,g=0,b=0,n=0;
  for(let p=0;p<d.length;p+=4){r+=d[p];g+=d[p+1];b+=d[p+2];n++;}
  r/=n;g/=n;b/=n;const gray=(r+g+b)/3,cl=x=>Math.max(0.78,Math.min(1.3,x));
  return [cl(gray/(r||1)),cl(gray/(g||1)),cl(gray/(b||1))];
}
/* Name a color from HSV — hue is far more stable under brightness changes than RGB. */
function classifyColor(r,g,b){
  const [h,s,v]=rgb2hsv(r,g,b);
  // Dark or low-saturation colors are neutral — tiny channel noise gives dark
  // pixels a fake hue, so resolve those to black/charcoal/gray FIRST.
  if(v<0.20)return"Black";
  if(s<0.16){ if(v>0.85)return"White"; return v<0.45?"Charcoal":"Gray"; }
  if(s<0.28&&v<0.42)return"Charcoal";
  if(s<0.30&&v>0.62){ if(h>=18&&h<70)return v>0.82?"Cream":"Beige"; if(h>=200&&h<260)return"Light Blue"; if(h>=290||h<18)return"Light Pink"; }
  if(h<16||h>=345)return v<0.45?"Maroon":"Red";
  if(h>=16&&h<45){ if(v<0.45)return"Brown"; if(s<0.55&&v>0.7)return v>0.85?"Cream":"Tan"; return"Orange"; }
  if(h>=45&&h<70)return s<0.5?"Beige":"Yellow";
  if(h>=70&&h<165)return v<0.4?"Dark Green":((h<105&&v<0.62)?"Olive":"Green");
  if(h>=165&&h<200)return"Teal";
  if(h>=200&&h<258){ if(v<0.4)return"Navy"; return(v>0.8&&s<0.5)?"Light Blue":"Blue"; }
  if(h>=258&&h<295)return"Purple";
  return(v>0.8&&s<0.55)?"Light Pink":"Pink";
}
/* Dominant quantized color across one or more sample regions of the source. */
function sampleDominant(sx, regions){
  const buckets=new Map();
  for(const [rx,ry,rw,rh] of regions){
    if(rw<1||rh<1) continue;
    const id=sx.getImageData(rx,ry,rw,rh).data;
    for(let p=0;p<id.length;p+=4){
      const key=(id[p]>>5)+"_"+(id[p+1]>>5)+"_"+(id[p+2]>>5);
      const e=buckets.get(key)||[0,0,0,0]; e[0]+=id[p];e[1]+=id[p+1];e[2]+=id[p+2];e[3]++; buckets.set(key,e);
    }
  }
  let best=null; for(const e of buckets.values()){ if(!best||e[3]>best[3]) best=e; }
  return best?[best[0]/best[3],best[1]/best[3],best[2]/best[3]]:null;
}

function loadImage(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}

/* Resize (shortest=640, longest<=1333) + ImageNet-normalize into a CHW float tensor. */
function preprocessForDetector(img){
  const W=img.naturalWidth,H=img.naturalHeight;
  let s=DET_SHORTEST/Math.min(W,H);
  if(Math.max(W,H)*s>DET_LONGEST) s=DET_LONGEST/Math.max(W,H);
  const w=Math.round(W*s),h=Math.round(H*s);
  const c=document.createElement("canvas");c.width=w;c.height=h;
  const cx=c.getContext("2d",{willReadFrequently:true});cx.drawImage(img,0,0,w,h);
  const d=cx.getImageData(0,0,w,h).data;
  const plane=w*h, data=new Float32Array(3*plane);
  for(let i=0;i<plane;i++){
    data[i]        =((d[i*4]  /255)-DET_MEAN[0])/DET_STD[0];
    data[plane+i]  =((d[i*4+1]/255)-DET_MEAN[1])/DET_STD[1];
    data[2*plane+i]=((d[i*4+2]/255)-DET_MEAN[2])/DET_STD[2];
  }
  return {data,h,w};
}

const CAT_COLORS={Tops:"#E891B5",Bottoms:"#8E78C0",Shoes:"#6B9AC0",Outerwear:"#6BA37C",Accessories:"#C39A3E"};

/* Draw labeled boxes over the photo so the user SEES what was identified. */
function annotatePhoto(img,W,H,items){
  const ac=document.createElement("canvas");ac.width=W;ac.height=H;
  const ax=ac.getContext("2d");ax.drawImage(img,0,0,W,H);
  const fs=Math.max(15,Math.round(W/32));
  ax.lineWidth=Math.max(3,Math.round(W/170));
  ax.font="700 "+fs+"px system-ui, sans-serif";ax.textBaseline="top";
  for(const it of items){
    const [x1,y1,x2,y2]=it.bbox;const col=CAT_COLORS[it.category]||"#E891B5";
    ax.strokeStyle=col;ax.strokeRect(x1,y1,x2-x1,y2-y1);
    const label=it.name;const tw=ax.measureText(label).width;const th=fs+8;
    const ly=y1-th>=0?y1-th:y1;
    ax.fillStyle=col;ax.fillRect(x1,ly,tw+14,th);
    ax.fillStyle="#fff";ax.fillText(label,x1+7,ly+4);
  }
  return ac.toDataURL("image/jpeg",0.92);
}

/* Light unsharp-mask for crispness on the enhanced crops. */
function sharpenCanvas(cx,w,h,k){
  if(w<3||h<3) return;
  const src=cx.getImageData(0,0,w,h), s=src.data;
  const out=cx.createImageData(w,h), o=out.data; o.set(s);
  const c=1+4*k;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const i=(y*w+x)*4;
    for(let ch=0;ch<3;ch++){
      const v=c*s[i+ch]-k*(s[i-4+ch]+s[i+4+ch]+s[i-w*4+ch]+s[i+w*4+ch]);
      o[i+ch]=v<0?0:v>255?255:v;
    }
  }
  cx.putImageData(out,0,0);
}
/* "Studio-ish" garment photo: crop the box from the source, sized so the longest
   side reaches CAP px (keeps big crops at full detail, gently upscales small ones),
   with a light tone + sharpen so it reads crisp and clean. (Real detail can't be
   invented — this preserves and polishes what the camera captured.) */
function enhanceCrop(src,sx,sy,sw,sh){
  const CAP=1000;
  let scale=Math.min(CAP/Math.max(sw,sh), 2.2);      // shrink oversized crops to CAP, upscale tiny ones up to 2.2x
  if(!isFinite(scale)||scale<=0) scale=1;
  const w=Math.max(1,Math.round(sw*scale)), h=Math.max(1,Math.round(sh*scale));
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  const cx=c.getContext("2d"); cx.imageSmoothingEnabled=true; cx.imageSmoothingQuality="high";
  try{ cx.filter="saturate(1.07) contrast(1.04) brightness(1.02)"; }catch(_){}
  cx.drawImage(src, sx,sy,sw,sh, 0,0,w,h);
  try{ cx.filter="none"; sharpenCanvas(cx,w,h,0.16); }catch(_){}
  return c.toDataURL("image/jpeg",0.95);
}

/* Detect garments in a photo. Returns {items:[{name,category,color,photo}], annotated}. */
async function detectGarments(dataUrl,onStage,corrections,fullUrl){
  const session=await getDetector(onStage);
  onStage&&onStage("Finding your pieces…");
  const img=await loadImage(dataUrl);
  const W=img.naturalWidth,H=img.naturalHeight;
  // Detection + colour run on the fast downscaled copy, but the SHOWN crops are
  // taken from the original full-resolution photo for maximum quality.
  let fullImg=img, fs=1;
  if(fullUrl && fullUrl!==dataUrl){ try{ fullImg=await loadImage(fullUrl); fs=fullImg.naturalWidth/W; }catch(e){ fullImg=img; fs=1; } }

  const {data,h,w}=preprocessForDetector(img);
  const input=new _ort.Tensor("float32",data,[1,3,h,w]);
  const feeds={}; feeds[session.inputNames[0]]=input;
  const out=await session.run(feeds);

  // logits [1,300,7], pred_boxes [1,300,4] (cxcywh, normalized)
  let logits=null,boxes=null;
  for(const n of session.outputNames){const t=out[n]; if(t.dims[2]===4) boxes=t; else logits=t;}
  const nq=logits.dims[1],nc=logits.dims[2],L=logits.data,B=boxes.data;

  let dets=[];
  for(let i=0;i<nq;i++){
    let best=-1,bj=0;
    for(let j=0;j<nc;j++){const v=sigmoid(L[i*nc+j]); if(v>best){best=v;bj=j;}}
    if(best<DET_THRESHOLD) continue;
    const cx=B[i*4],cy=B[i*4+1],bw=B[i*4+2],bh=B[i*4+3];
    const box=[Math.max(0,(cx-bw/2)*W),Math.max(0,(cy-bh/2)*H),Math.min(W,(cx+bw/2)*W),Math.min(H,(cy+bh/2)*H)];
    dets.push({score:best,label:DET_LABELS[bj],box});
  }
  dets.sort((a,b)=>b.score-a.score);
  let kept=[];
  for(const d of dets){ if(kept.every(k=>!((k.label===d.label && iou(k.box,d.box)>0.6) || iou(k.box,d.box)>0.85))) kept.push(d); }

  // A pair of shoes is two boxes — collapse them into ONE item (the union box) so
  // the closet shows a single pair, not a left and right shoe separately.
  const shoeDets=kept.filter((k)=>k.label==="shoes");
  if(shoeDets.length>1){
    const xs=shoeDets.flatMap((s)=>[s.box[0],s.box[2]]), ys=shoeDets.flatMap((s)=>[s.box[1],s.box[3]]);
    const merged={label:"shoes",score:Math.max(...shoeDets.map((s)=>s.score)),
      box:[Math.min(...xs),Math.min(...ys),Math.max(...xs),Math.max(...ys)]};
    kept=kept.filter((k)=>k.label!=="shoes").concat([merged]);
  }

  const sc=document.createElement("canvas");sc.width=W;sc.height=H;
  const sx=sc.getContext("2d",{willReadFrequently:true});sx.drawImage(img,0,0,W,H);
  const items=[];
  for(const d of kept){
    const map=DET_MAP[d.label]; if(!map) continue;
    const x1=Math.round(d.box[0]),y1=Math.round(d.box[1]),x2=Math.round(d.box[2]),y2=Math.round(d.box[3]);
    const bw=Math.max(1,x2-x1),bh=Math.max(1,y2-y1);
    if(bw*bh < W*H*0.003) continue;
    const crop=document.createElement("canvas");crop.width=bw;crop.height=bh;
    crop.getContext("2d").drawImage(sc,x1,y1,bw,bh,0,0,bw,bh);
    // Sample a tight central patch and take the MEDIAN-ish dominant color
    // (robust to background bleeding in at the box edges).
    // Outerwear is often open over a darker layer — sample the side panels (where
    // the coat fabric is) instead of the center (which shows the layer beneath).
    let regions;
    if(map.category==="Outerwear"){
      regions=[[Math.round(x1+bw*0.06),Math.round(y1+bh*0.25),Math.max(1,Math.round(bw*0.20)),Math.max(1,Math.round(bh*0.50))],
               [Math.round(x1+bw*0.74),Math.round(y1+bh*0.25),Math.max(1,Math.round(bw*0.20)),Math.max(1,Math.round(bh*0.50))]];
    } else {
      regions=[[Math.round(x1+bw*0.35),Math.round(y1+bh*0.35),Math.max(1,Math.round(bw*0.30)),Math.max(1,Math.round(bh*0.30))]];
    }
    const dom=sampleDominant(sx, regions);
    const color=dom?classifyColor(dom[0],dom[1],dom[2]):"Neutral";
    const fx=Math.round(x1*fs),fy=Math.round(y1*fs),fbw=Math.max(1,Math.round(bw*fs)),fbh=Math.max(1,Math.round(bh*fs));
    items.push({name:color+" "+map.noun,category:map.category,subcategory:map.sub||null,color,noun:map.noun,detLabel:d.label,photo:enhanceCrop(fullImg,fx,fy,fbw,fbh),bbox:[x1,y1,x2,y2],area:bw*bh});
  }
  items.sort((a,b)=>b.area-a.area);
  // Cut out the garment FIRST (removes background + neighbouring clothes), THEN
  // read colour and type from those clean pixels — far more accurate than the raw
  // rectangular crop, which bleeds in skin, background and adjacent garments.
  await cutoutItems(items, sc, W, H, onStage);
  await refineLabels(items,onStage);
  // Apply the user's own learned corrections (e.g. "this type is Outerwear, not
  // Tops") so a fix they made once sticks on every future scan.
  if(corrections){
    for(const it of items){
      const c=corrections[(it.noun||"").toLowerCase()];
      if(c&&c.category){ it.category=c.category; it.subcategory=c.category==="Accessories"?(c.subcategory||null):null; }
    }
  }
  const annotated=items.length?annotatePhoto(img,W,H,items):null;
  return {items:items.map(({area,bbox,detLabel,clfPhoto,...r})=>r),annotated};
}

async function downscaleDataUrl(dataUrl,max=1000){
  const img=await loadImage(dataUrl);const scale=Math.min(1,max/Math.max(img.naturalWidth,img.naturalHeight));
  const w=Math.round(img.naturalWidth*scale),h=Math.round(img.naturalHeight*scale);
  const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
  return c.toDataURL("image/jpeg",0.9);
}

/* Build a varied, contextual stylist note: silhouette cue + layering + how it
   fits the vibe/aesthetic/occasion/weather. Rotates phrasing by outfit index so
   the five looks don't read the same. */
function makeNote(items, ctx){
  ctx = ctx || {};
  const idx = ctx.idx || 0;
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const top=items.find(i=>i.category==="Tops"), bottom=items.find(i=>i.category==="Bottoms"),
        outer=items.find(i=>i.category==="Outerwear"), shoe=items.find(i=>i.category==="Shoes"),
        extra=items.find(i=>i.category==="Accessories");
  const nm = (it) => it ? it.name.toLowerCase() : "";
  let cues;
  if(top&&bottom) cues=[
    `half-tuck the ${nm(top)} into the ${nm(bottom)} and cuff the hem`,
    `let the ${nm(top)} sit relaxed over the ${nm(bottom)}`,
    `tuck the ${nm(top)} in to define the waist with the ${nm(bottom)}`];
  else if(top) cues=[`make the ${nm(top)} the hero and keep the rest quiet`, `let the ${nm(top)} do all the talking`];
  else if(bottom) cues=[`build around the ${nm(bottom)} with a fitted layer up top`];
  else cues=[`keep the proportions balanced and easy`];
  let body = cap(cues[idx % cues.length]) + ".";
  const adds = [];
  if(outer) adds.push(`throw the ${nm(outer)} on open`);
  if(shoe) adds.push(`let the ${nm(shoe)} ground it`);
  if(extra) adds.push(`finish with the ${nm(extra)}`);
  if(adds.length) body += " " + cap(adds.join(", ")) + ".";
  const baseTxt = ctx.baseStyle==="Korean" ? "crisp, trend-forward Korean-street polish"
                : ctx.baseStyle==="Cali" ? "sun-washed California ease" : "an effortless, pulled-together feel";
  const aes = ctx.aesthetic ? ctx.aesthetic.toLowerCase() : "";
  let vibe = "It leans into " + baseTxt + (aes ? " with a " + aes + " touch" : "");
  const tails = [];
  if(ctx.occasion) tails.push("right for " + ctx.occasion.toLowerCase());
  const w = ctx.weather;
  if(w && w.temp!=null){
    let wa;
    if(w.temp<=45) wa = "warm enough for the " + w.temp + "° chill";
    else if(w.temp<=60) wa = "layered for the " + w.temp + "° " + w.condition.toLowerCase();
    else if(w.temp<=78) wa = "easy in the " + w.temp + "° " + w.condition.toLowerCase();
    else wa = "breezy for the " + w.temp + "° heat";
    tails.push(wa);
  }
  if(tails.length) vibe += " — " + tails.join(", and ");
  vibe += ".";
  return body + " " + vibe;
}

  "Boho":             { types:[/maxi dress|sundress|wide-leg|sandal|cardigan|wide-brim|denim|midi skirt/], colors:["Brown","Tan","Olive","Cream","Beige","Orange","Maroon"] },

function aestheticAffinity(item, aesthetic){
  const t = AESTHETIC_TRAITS[aesthetic]; if(!t) return 0;
  const txt = ((item.noun||"")+" "+(item.name||"")).toLowerCase();
  let s = 0;
  if(t.types){ for(const re of t.types){ if(re.test(txt)){ s += 2; break; } } }
  if(t.colors && item.color && t.colors.indexOf(item.color) >= 0) s += 1.5;
  return s;
}

  // Everyday casual — hangouts, errands, shopping
  { match:/casual|hangout|hang out|errand|weekend|chill|mall|shopping|day out|stroll/i,
    boost:[/jean|t-shirt|tee|sneaker|sweater|cardigan|hoodie|short|sundress/], avoid:[/heel|bodycon|gown|blazer/] },
  // Travel — comfort first
  { match:/travel|flight|airport|road ?trip|commute|plane/i,
    boost:[/legging|sweatpant|hoodie|sneaker|jean|sweater|cardigan|tank/], avoid:[/heel|bodycon|gown|blazer|trouser/] },
  // Gym / active
  { match:/gym|workout|exercise|run|yoga|sport|hike|pilates|fitness/i,
    boost:[/legging|sweatpant|sneaker|tank|short|hoodie/], avoid:[/dress|heel|blouse|skirt|loafer|trouser|coat|boot/] },
  // Beach / vacation
  { match:/beach|pool|vacation|resort|tropical|cruise|summer/i,
    boost:[/sundress|short|sandal|tank|maxi dress|camisole/], avoid:[/coat|wool|blazer|boot|heel|sweater|puffer|trench/] },
];
function occasionAffinity(item, occText){
  if(!occText) return 0;
  const rule = OCCASION_RULES.find(r => r.match.test(occText));
  if(!rule) return 0;
  const txt = ((item.noun||"")+" "+(item.name||"")).toLowerCase();
  let s = 0;
  if(rule.boost.some(re => re.test(txt))) s += 2.5;
  if(rule.avoid.some(re => re.test(txt))) s -= 3;
  return s;
}

/* Compose up to 5 coherent outfits from real closet items.
   opts.tryNew: include 1-2 "try something new" looks; off = all on preferred vibe.
   opts.baseStyle: "Cali" | "Korean" — picks the model photo set + note flavor. */
function buildOutfits(closet, likedAesthetics, favorites, opts){
  opts = opts || {};
  const byCat=c=>closet.filter(i=>i.category===c);
  const tops=byCat("Tops"),bottoms=byCat("Bottoms"),shoes=byCat("Shoes"),
        outer=byCat("Outerwear"),acc=byCat("Accessories");
  if(closet.length<2||(tops.length===0&&bottoms.length===0))return [];
  const favItemIds=new Set((favorites||[]).flatMap(f=>(f.items||[]).map(it=>it.id)));
  // Learned preferences from past ratings / swipe-aways.
  const fb=opts.feedback||{};
  const aScore=a=>(fb.aesthetic&&fb.aesthetic[a])||0;
  const iScore=id=>(fb.item&&fb.item[id])||0;

  // Aesthetic plan for the 5 looks — drop strongly-disliked aesthetics and lead
  // with the ones the user has rated highest.
  const likedArr=[...likedAesthetics].filter(a=>aScore(a)>-3);
  const preferred=(likedArr.length?likedArr:["Minimalist","Clean Girl","Streetwear"]).slice().sort((a,b)=>aScore(b)-aScore(a));
  const others=AESTHETICS.filter(a=>!likedAesthetics.has(a)&&aScore(a)>-2).sort((a,b)=>aScore(b)-aScore(a));
  const plan=[];
  for(let i=0;i<5;i++){
    if(opts.tryNew && i>=3 && others.length){ plan.push({a:others[(i-3)%others.length],familiar:false}); }
    else { plan.push({a:preferred[i%preferred.length],familiar:true}); }
  }
  const basePhotos = opts.baseStyle==="Korean" ? KOREAN_PHOTOS : CALI_PHOTOS;
  // Weather-aware: skip outerwear when it's warm out.
  const wTemp = opts.weather && opts.weather.temp;
  const wantOuter = (wTemp==null) || wTemp <= 72;

  // How well an item fits a slot for a given aesthetic. Aesthetic match dominates,
  // then learned ratings + favorites.
  const score=(it,aes)=> 2.4*aestheticAffinity(it,aes) + occasionAffinity(it,opts.occasion) + iScore(it.id) + (it.fav?0.6:0) + (favItemIds.has(it.id)?0.6:0);
  const rankedFor=(arr,aes)=>[...arr].sort((a,b)=>score(b,aes)-score(a,aes));
  const isDress=it=>!!it && /dress/i.test((it.noun||"")+" "+(it.name||""));
  // Up to 2 accessories from DIFFERENT sub-categories (never two bags), best-match
  // for the aesthetic first.
  const pickAccs=(aes)=>{ const out=[],seen=new Set(); for(const it of rankedFor(acc,aes)){ const sub=it.subcategory||"Acc"; if(seen.has(sub))continue; seen.add(sub); out.push(it); if(out.length>=2)break; } return out; };

  const outfits=[],used=new Set();
  const push=(set,pe)=>{
    let items=set.filter(Boolean);
    // Never wear two of the same single-wear slot (two bags, two hats, two pairs
    // of shoes, etc.).
    const seenSlot=new Set();
    items=items.filter(it=>{ const slot=it.category==="Accessories"?("acc:"+(it.subcategory||"")):it.category; if(seenSlot.has(slot))return false; seenSlot.add(slot); return true; });
    if(items.length<2||outfits.length>=5)return;
    const key=items.map(i=>i.id).sort().join("-");if(used.has(key))return;used.add(key);
    outfits.push({
      id:"gen_"+key,
      title:OUTFIT_TITLES[outfits.length%OUTFIT_TITLES.length],
      aesthetic:(opts.baseStyle?opts.baseStyle+" · ":"")+pe.a,
      img:basePhotos[outfits.length%basePhotos.length],
      note:makeNote(items,{ baseStyle:opts.baseStyle, aesthetic:pe.a, occasion:opts.occasion, weather:opts.weather, idx:outfits.length }),
      items:items.map(i=>({id:i.id,name:i.name,category:i.category,photo:i.photo})),
      familiar:pe.familiar,
    });
  };

  // Build one look per planned aesthetic, choosing the closet items that best match
  // it. For variety we rotate — but ONLY among items close to the best score, so a
  // clearly-wrong piece (jeans for a party) never surfaces when a better option
  // exists. Cycle extra rounds to fill up to five.
  for(let i=0;i<14 && outfits.length<5;i++){
    const pe=plan[i%plan.length], aes=pe.a;
    const pick=(arr,n)=>{
      if(!arr.length) return null;
      // Drop occasion-inappropriate pieces (jeans/sneakers for a party, etc.) as long
      // as the category still has a suitable option left.
      const ok=arr.filter(it=>occasionAffinity(it,opts.occasion)>=0);
      const cand=ok.length?ok:arr;
      const ranked=rankedFor(cand,aes);
      const best=score(ranked[0],aes);
      const pool=ranked.filter(it=>score(it,aes)>=best-1.6).slice(0,n);   // vary only among near-best
      return pool[i%pool.length];
    };
    const top=pick(tops,3);
    const set=[top, isDress(top)?null:pick(bottoms,3), pick(shoes,2), wantOuter?pick(outer,2):null, ...pickAccs(aes)];
    push(set,pe);
  }
  return outfits.slice(0,5);
}

/* ---------- AI stylist (optional) ----------
   When the user has saved their own Anthropic API key, outfits are composed by
   Claude with current good-style/social-media fashion sense, using ONLY the real
   closet items. The key lives only in the browser (localStorage), never in code.
   Falls back to buildOutfits() on any error. */
const AI_KEY_LS = "fitcheck_ai_key";
const AI_MODEL = "claude-opus-4-8";
const getAiKey = () => { try { return (localStorage.getItem(AI_KEY_LS) || "").trim(); } catch (e) { return ""; } };
const setAiKey = (v) => { try { v ? localStorage.setItem(AI_KEY_LS, v.trim()) : localStorage.removeItem(AI_KEY_LS); } catch (e) {} };

/* ---------- learning / persistence ----------
   Outfit feedback (star ratings + swipe-aways) is accumulated into running scores
   per aesthetic and per item, then fed back into outfit generation so looks get
   more personalized over time. STYLE_STARS+ ratings promote that look's aesthetic
   into the user's style.

   Storage is IndexedDB, NOT localStorage: closet photos are far larger than the
   ~5MB localStorage cap, which silently dropped them and left placeholder icons
   after a reload. IndexedDB has a much larger quota and keeps the real photos. */
const STATE_LS = "fitcheck_state_v1";   // legacy localStorage key (migration only)
const STATE_KEY = "state";
const STYLE_STARS = 4;
function emptyFeedback(){ return { ratings:{}, aesthetic:{}, item:{}, corrections:{} }; }
const bareAesthetic = (a) => { a = a || ""; const i = a.indexOf("· "); return (i >= 0 ? a.slice(i + 2) : a).trim(); };

function idbOpen(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open("fitcheck", 1);
    r.onupgradeneeded = () => { try { r.result.createObjectStore("kv"); } catch (e) {} };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key){
  try { const db = await idbOpen(); return await new Promise((res, rej) => {
    const t = db.transaction("kv", "readonly").objectStore("kv").get(key);
    t.onsuccess = () => res(t.result); t.onerror = () => rej(t.error);
  }); } catch (e) { return null; }
}
async function idbSet(key, val){
  try { const db = await idbOpen(); return await new Promise((res, rej) => {
    const tx = db.transaction("kv", "readwrite"); tx.objectStore("kv").put(val, key);
    tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error);
  }); } catch (e) { return false; }
}
// One-time migration of any wardrobe saved by the older localStorage build.
function loadLegacyState(){ try { return JSON.parse(localStorage.getItem(STATE_LS)) || null; } catch (e) { return null; } }

const AI_OUTFIT_SCHEMA = {
  type: "object",
  properties: {
    outfits: {
      type: "array",
      items: {
        type: "object",
        properties: {
          title: { type: "string" },
          aesthetic: { type: "string" },
          note: { type: "string" },
          item_ids: { type: "array", items: { type: "string" } },
        },
        required: ["title", "aesthetic", "note", "item_ids"],
        additionalProperties: false,
      },
    },
  },
  required: ["outfits"],
  additionalProperties: false,
};

async function aiBuildOutfits(closet, opts){
  opts = opts || {};
  const key = opts.key || getAiKey();
  if (!key) throw new Error("no key");
  const fb = opts.feedback || {};
  const fbA = fb.aesthetic || {}, fbI = fb.item || {};
  const loved = Object.keys(fbA).filter((k) => fbA[k] >= 2);
  const disliked = Object.keys(fbA).filter((k) => fbA[k] <= -2);
  const lovedItems = new Set(Object.keys(fbI).filter((k) => fbI[k] >= 1));
  const avoidItems = new Set(Object.keys(fbI).filter((k) => fbI[k] <= -1));
  const items = closet.map((i) => ({
    id: i.id, name: i.name, category: i.category, color: i.color,
    ...(lovedItems.has(i.id) ? { liked: true } : {}),
    ...(avoidItems.has(i.id) ? { avoid: true } : {}),
  }));
  const w = opts.weather;
  const baseTxt = opts.baseStyle === "Korean" ? "clean, trend-forward Korean-street polish" : "sun-washed, relaxed California ease";
  const sys = "You are an expert fashion stylist for a Gen-Z / teen-girl audience. You compose outfits ONLY from the user's real wardrobe (the provided item ids), drawing on the kind of good-style outfits people post on Pinterest, Instagram and TikTok right now. The house aesthetic is " + baseTxt + " crossed with effortless, put-together styling. Be specific and trend-aware; never invent items that aren't in the wardrobe.";
  const userMsg =
    "Wardrobe (use only these item ids):\n" + JSON.stringify(items) +
    "\n\nBase style: " + (opts.baseStyle || "Cali") +
    "\nLiked aesthetics: " + ((opts.aesthetics && opts.aesthetics.length) ? opts.aesthetics.join(", ") : "open") +
    "\nOccasion: " + (opts.occasion || "everyday") +
    "\nWeather: " + (w && w.temp != null ? (w.temp + "°F, " + w.condition) : "unknown") +
    "\nAesthetics the user has rated highly (lean in): " + (loved.length ? loved.join(", ") : "none yet") +
    "\nAesthetics the user disliked (avoid): " + (disliked.length ? disliked.join(", ") : "none") +
    "\n" + (opts.tryNew ? "Make 1–2 of the looks explore a fresh aesthetic; keep the rest on the preferred vibe." : "Keep every look on the user's preferred vibe.") +
    "\n\nCompose up to 5 complete, wearable outfits. Each outfit must include a top + bottom OR a single dress, plus shoes and optional outerwear/accessories — all referenced by item id from the wardrobe above. Favor items flagged liked:true and de-emphasize items flagged avoid:true. Never put two of the same kind of item in one outfit (e.g. two bags, two pairs of shoes, two hats) — at most one of each. Be weather-smart: include outerwear when it's cold, skip it when it's warm. For each outfit give a short trendy title, the single aesthetic it best matches, and a 2–3 sentence stylist note grounded in current social-media fashion that says how it fits the user's vibe, that aesthetic, the occasion, and the weather. Make the notes distinct from each other.";

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: opts.model || AI_MODEL,
      max_tokens: 2000,
      system: sys,
      messages: [{ role: "user", content: userMsg }],
      output_config: { format: { type: "json_schema", schema: AI_OUTFIT_SCHEMA } },
    }),
  });
  if (!res.ok) { const t = await res.text().catch(() => ""); throw new Error("api " + res.status + " " + t.slice(0, 200)); }
  const data = await res.json();
  if (data.stop_reason === "refusal") throw new Error("refusal");
  const block = (data.content || []).find((b) => b.type === "text");
  if (!block) throw new Error("no text");
  const parsed = JSON.parse(block.text);
  const byId = new Map(closet.map((i) => [i.id, i]));
  const basePhotos = opts.baseStyle === "Korean" ? KOREAN_PHOTOS : CALI_PHOTOS;
  const out = [];
  (parsed.outfits || []).forEach((o, idx) => {
    const its = (o.item_ids || []).map((id) => byId.get(id)).filter(Boolean);
    if (its.length < 2) return;
    const key2 = its.map((i) => i.id).sort().join("-");
    out.push({
      id: "ai_" + key2,
      title: o.title || OUTFIT_TITLES[idx % OUTFIT_TITLES.length],
      aesthetic: (opts.baseStyle ? opts.baseStyle + " · " : "") + (o.aesthetic || "Everyday"),
      img: basePhotos[idx % basePhotos.length],
      note: o.note || "",
      items: its.map((i) => ({ id: i.id, name: i.name, category: i.category, photo: i.photo })),
      familiar: true,
    });
  });
  if (!out.length) throw new Error("empty");
  return out.slice(0, 5);
}

/* --- live weather (Open-Meteo, no API key; geolocation, with IP fallback) --- */
function weatherDesc(code, temp){
  let condition = "Clear", icon = "sun";
  if(code===0){ condition="Clear"; icon="sun"; }
  else if(code<=2){ condition="Partly cloudy"; icon="sun"; }
  else if(code===3){ condition="Cloudy"; icon="cloud"; }
  else if(code===45||code===48){ condition="Foggy"; icon="cloud"; }
  else if(code>=51&&code<=67){ condition="Rainy"; icon="rain"; }
  else if(code>=71&&code<=77){ condition="Snowy"; icon="snow"; }
  else if(code>=80&&code<=82){ condition="Showers"; icon="rain"; }
  else if(code>=85&&code<=86){ condition="Snow showers"; icon="snow"; }
  else if(code>=95){ condition="Thunderstorm"; icon="rain"; }
  let tip = "Dressing for the day.";
  if(temp!=null){
    if(temp<=40) tip="Bundle up — a warm coat is a must.";
    else if(temp<=55) tip="Jacket-and-layers weather.";
    else if(temp<=68) tip="Light layers — great for a cardigan.";
    else if(temp<=80) tip="Warm — keep it light and breezy.";
    else tip="Hot — go airy and minimal.";
  }
  return { condition, icon, tip };
}
async function fetchWeather(){
  let lat=null, lon=null, place=null;
  try {
    const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{ timeout:8000, maximumAge:600000 }));
    lat=pos.coords.latitude; lon=pos.coords.longitude;
  } catch(e){
    try { const ip = await (await fetch("https://ipapi.co/json/")).json(); lat=ip.latitude; lon=ip.longitude; place=ip.city; } catch(e2){}
  }
  if(lat==null) return null;
  try {
    const u = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,apparent_temperature,weather_code&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=auto";
    const w = await (await fetch(u)).json();
    const cur = w.current||{};
    const temp = Math.round(cur.temperature_2m);
    const dmax = w.daily&&w.daily.temperature_2m_max&&w.daily.temperature_2m_max[0];
    const dmin = w.daily&&w.daily.temperature_2m_min&&w.daily.temperature_2m_min[0];
    return { temp, feels: Math.round(cur.apparent_temperature), high: Math.round(dmax), low: Math.round(dmin), code: cur.weather_code, place, ...weatherDesc(cur.weather_code, temp) };
  } catch(e){ return null; }
}
function WeatherIcon({ icon, size, color }){
  return icon==="sun" ? <Sun size={size} color={color} /> : <Cloud size={size} color={color} />;
}

/* The outfit "photo" = a moodboard of the user's REAL items, so the image always
   matches the pieces in the look. */
/* A real online photo of a similar item (matched by color + type from the item's
   name). Falls back to the user's own cutout if it fails to load. */
/* Curated clean clothing-product photos by garment type (verified). Matched by
   keyword in the item name; types without a good match fall back to the user's
   own cutout. (Color isn't matched — these are type-similar inspo shots.) */
const STOCK_W = "?auto=format&fit=crop&w=300&q=72";
const CLOTHING_STOCK = [
  { kw:["sneaker","trainer"], id:"photo-1542291026-7eec264c27ff" },
  { kw:["boot"], id:"photo-1608256246200-53e635b5b65f" },
  { kw:["heel","pump","stiletto"], id:"photo-1543163521-1bf539c55dd2" },
  { kw:["sandal","slide"], id:"photo-1603487742131-4160ec999306" },
  { kw:["jean"], id:"photo-1542272604-787c3835535d" },
  { kw:["short"], id:"photo-1591195853828-11db59a44f6b" },
  { kw:["trouser","pant","legging","cargo","slack","sweatpant"], id:"photo-1594633312681-425c7b97ccd1" },
  { kw:["dress","jumpsuit"], id:"photo-1595777457583-95e059d581b8" },
  { kw:["hoodie","sweatshirt"], id:"photo-1556821840-3a63f95609a7" },
  { kw:["sweater","cardigan","knit","turtleneck"], id:"photo-1576871337622-98d48d1cf531" },
  { kw:["coat","trench","overcoat","parka"], id:"photo-1539533018447-63fcce2678e3" },
  { kw:["jacket","blazer","bomber","windbreaker","puffer"], id:"photo-1551028719-00167b16eac5" },
  { kw:["button","blouse","oxford"], id:"photo-1602810318383-e386cc2a3ccf" },
  { kw:["shirt","tee","tank","camisole","polo","crop","top"], id:"photo-1521572163474-6864f9cf17ab" },
  { kw:["bag","tote","clutch","backpack","handbag","purse","crossbody"], id:"photo-1584917865442-de89df76afd3" },
  { kw:["beanie"], id:"photo-1576871337632-b9aef4c17ab9" },
  { kw:["hat","cap","beret","bucket"], id:"photo-1521369909029-2afed882baee" },
  { kw:["sunglass","glass"], id:"photo-1511499767150-a48a237f0083" },
  { kw:["belt"], id:"photo-1624222247344-550fb60583dc" },
];
function stockImageUrl(item){
  const n = (item.name||"").toLowerCase();
  for(const e of CLOTHING_STOCK){ if(e.kw.some(k=>n.includes(k))) return "https://images.unsplash.com/"+e.id+STOCK_W; }
  return null; // no clean match -> use the user's own cutout
}
function StockImg({ item }) {
  // Prefer the user's own cutout so the picture matches the exact item they shot;
  // fall back to a type-matched stock photo for manually-added items (no photo).
  const [src, setSrc] = useState(item.photo || stockImageUrl(item));
  return <img src={src} alt={item.name} className="w-full h-full object-cover"
    onError={() => { const sb = stockImageUrl(item); if (sb && src !== sb) setSrc(sb); }} />;
}
function OutfitCollage({ items, pastel }) {
  const list = (items || []).slice(0, 5);
  const big = list.length <= 2;
  return (
    <div className="w-full rounded-3xl overflow-hidden relative flex flex-wrap items-center justify-center gap-2 p-3"
      style={{ height: 260, background: pastel.ring + "55" }}>
      {list.map((it) => (
        <div key={it.id} className="rounded-2xl overflow-hidden bg-white shadow-sm flex items-center justify-center"
          style={{ width: big ? "46%" : "30.5%", height: big ? "88%" : "46%" }}>
          {(it.photo || it.name) ? <StockImg item={it} />
                    : <CatIcon category={it.category} size={28} color={pastel.text} />}
        </div>
      ))}
    </div>
  );
}

/* A generated-look card. Rate it 1–5★ (feeds personalization) or SWIPE it away
   to dismiss it (a soft downvote). */
function OutfitCard({ o, fav, rating, baseLabel, onFav, onRate, onDismiss }) {
  const [open, setOpen] = useState(false);
  const [dx, setDx] = useState(0);
  const [gone, setGone] = useState(false);
  const startX = useRef(null), cur = useRef(0), moved = useRef(false);
  const DISMISS = 110;

  const down = (e) => { startX.current = e.clientX; cur.current = 0; moved.current = false; };
  const mv = (e) => {
    if (startX.current == null) return;
    const d = e.clientX - startX.current;
    // Capture the pointer only once a real drag starts — otherwise the card would
    // swallow taps and the star buttons (and heart) would never register a click.
    if (!moved.current && Math.abs(d) > 6) { moved.current = true; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} }
    cur.current = d; setDx(d);
  };
  const up = () => {
    if (startX.current == null) return; startX.current = null;
    if (Math.abs(cur.current) > DISMISS) {
      const dir = cur.current < 0 ? -1 : 1;
      setGone(true); setDx(dir * 600);
      setTimeout(() => onDismiss(o), 220);
    } else { setDx(0); }
  };
  const dragging = startX.current != null;
  const opacity = gone ? 0 : Math.max(0.4, 1 - Math.abs(dx) / 320);

  return (
    <div style={{ transform: `translateX(${dx}px)`, opacity, touchAction: "pan-y",
      transition: dragging ? "none" : "transform .25s ease, opacity .25s ease" }}
      onPointerDown={down} onPointerMove={mv} onPointerUp={up} onPointerCancel={up}>
      <div className="rounded-3xl p-4 relative" style={{ background: o.pastel.bg }}>
        {moved.current && Math.abs(dx) > 28 && (
          <div className="absolute top-3 left-1/2 -translate-x-1/2 z-10 text-[11px] font-extrabold px-3 py-1 rounded-full shadow-sm"
            style={{ background: "#fff", color: o.pastel.text }}>
            {Math.abs(dx) > DISMISS ? "Release to remove" : "Swipe further to remove"}
          </div>
        )}
        <OutfitCollage items={o.items} pastel={o.pastel} />
        <div className="flex items-center justify-between mt-3 gap-2">
          <h3 className="text-[17px] font-black" style={{ color: o.pastel.text }}>{o.title}</h3>
          <button onClick={() => onFav(o)}
            className="w-9 h-9 rounded-full flex items-center justify-center active:scale-90 transition-transform shrink-0"
            style={{ background: fav ? o.pastel.ring : "#ffffffcc" }}>
            <Heart size={18} color={o.pastel.text} fill={fav ? o.pastel.text : "none"} />
          </button>
        </div>
        <div className="mt-1.5">
          <span className="inline-flex items-center gap-1 text-[11px] font-extrabold px-2.5 py-1 rounded-full" style={{ background: "#ffffffaa", color: o.pastel.text }}>
            {o.familiar ? <><Heart size={11} /> For your vibe · {o.aesthetic}</> : <><Sparkles size={11} /> Try something new · {o.aesthetic}</>}
          </span>
        </div>

        {/* rating — teaches the app your taste */}
        <div className="mt-3 rounded-2xl px-3.5 py-2.5" style={{ background: "#ffffffcc" }}>
          <div className="text-[11.5px] font-extrabold mb-1.5" style={{ color: o.pastel.text }}>
            {rating
              ? (rating >= STYLE_STARS ? "★ Loved — added to your style" : "Thanks — personalizing your looks")
              : "Rate this look to personalize your style"}
          </div>
          <div className="flex items-center gap-1.5">
            {[1, 2, 3, 4, 5].map((s) => (
              <button key={s} onClick={(e) => { e.stopPropagation(); onRate(o, s); }}
                className="active:scale-90 transition-transform" aria-label={"rate " + s + " stars"}>
                <Star size={28} color={o.pastel.text} fill={s <= rating ? o.pastel.text : "none"} strokeWidth={2.25} />
              </button>
            ))}
          </div>
        </div>

        {/* item list */}
        <div className="mt-3 space-y-1.5">
          {o.items.map((it, k) => (
            <div key={k} className="flex items-center gap-2.5 px-3 py-2 rounded-2xl" style={{ background: "#ffffff99" }}>
              <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 overflow-hidden" style={{ background: o.pastel.ring }}>
                {it.photo
                  ? <img src={it.photo} alt="" className="w-full h-full object-cover" />
                  : <CatIcon category={it.category} size={15} color={o.pastel.text} />}
              </div>
              <span className="text-[13px] font-extrabold" style={{ color: "#5A5167" }}>{it.name}</span>
              <span className="ml-auto text-[11px] font-bold" style={{ color: o.pastel.text }}>{it.category}</span>
            </div>
          ))}
        </div>

        <button onClick={() => setOpen((v) => !v)}
          className="mt-2 w-full flex items-center justify-between px-4 py-2.5 rounded-2xl text-[13px] font-extrabold"
          style={{ background: "#ffffffaa", color: o.pastel.text }}>
          Stylist Note
          <ChevronDown size={16} style={{ transform: open ? "rotate(180deg)" : "none", transition: "transform .25s" }} />
        </button>
        <div style={{ maxHeight: open ? 220 : 0, overflow: "hidden", transition: "max-height .35s ease" }}>
          <p className="text-[13px] font-semibold leading-relaxed px-1 pt-3" style={{ color: o.pastel.text }}>{o.note}</p>
        </div>

        <div className="text-[10.5px] font-bold mt-3 text-center" style={{ color: o.pastel.text + "99" }}>
          ◂ swipe this card away if it's not your vibe
        </div>
      </div>
    </div>
  );
}

function StylistTab({ closet, favorites, toggleFav, prefs, weather, onRate, onDismiss }) {
  const [occasion, setOccasion] = useState("");
  const [custom, setCustom] = useState("");
  const [outfits, setOutfits] = useState([]);
  const [generating, setGenerating] = useState(false);
  const [tried, setTried] = useState(false);
  const [ratings, setRatings] = useState(() => ({ ...(prefs?.feedback?.ratings || {}) }));

  const favIds = new Set(favorites.map((f) => f.id));

  const [aiMode, setAiMode] = useState(false); // true when the last batch was AI-composed

  const handleRate = (o, s) => { setRatings((r) => ({ ...r, [o.id]: s })); onRate && onRate(o, s); };
  const handleDismiss = (o) => { setOutfits((list) => list.filter((x) => x.id !== o.id)); onDismiss && onDismiss(o); };

  const generate = async () => {
    setGenerating(true);
    setTried(true);
    setOutfits([]);
    setAiMode(false);
    // Looks the user leans toward: favorited outfits' aesthetics + profile picks.
    const favAesthetics = favorites.map((f) => f.aesthetic);
    const likedAesthetics = new Set([...favAesthetics, ...(prefs?.aesthetics || [])]);
    const occ = custom.trim() || occasion;
    const finish = (built, ai) => {
      setOutfits(built.map((o, i) => ({ ...o, pastel: PASTELS[i % PASTELS.length] })));
      setAiMode(ai);
      setGenerating(false);
    };
    // If the user saved an API key, let Claude compose trend-aware outfits.
    if (getAiKey()) {
      try {
        const ai = await aiBuildOutfits(closet, {
          baseStyle: prefs?.baseStyle, aesthetics: [...likedAesthetics],
          occasion: occ, weather, tryNew: !!prefs?.tryNew, feedback: prefs?.feedback,
        });
        finish(ai, true);
        return;
      } catch (e) {
        // fall through to the built-in engine
      }
    }
    setTimeout(() => {
      const built = buildOutfits(closet, likedAesthetics, favorites, { tryNew: !!prefs?.tryNew, baseStyle: prefs?.baseStyle, occasion: occ, weather, feedback: prefs?.feedback });
      finish(built, false);
    }, 500);
  };

  return (
    <div className="pb-40">
      <WeatherBar weather={weather} />

      <h1 className="text-[34px] leading-tight font-black mt-10 mb-6" style={{ color: "#5A5167" }}>Outfit ideas, just a click away</h1>

      {/* Occasion */}
      <label className="text-xs font-bold uppercase tracking-wide" style={{ color: "#A99FB5" }}>Occasion</label>
      <div className="relative mt-2 mb-3">
        <select value={occasion} onChange={(e) => setOccasion(e.target.value)}
          className="w-full appearance-none rounded-2xl px-4 py-4 text-[15px] font-bold outline-none"
          style={{ background: "#fff", border: "1.5px solid #EFE3F0", color: "#6E6480" }}>
          <option value="">Pick an occasion…</option>
          {OCCASIONS.map((o) => <option key={o}>{o}</option>)}
        </select>
        <ChevronDown size={18} className="absolute right-4 top-4 pointer-events-none" color="#C6BCD2" />
      </div>
      <input value={custom} onChange={(e) => setCustom(e.target.value)}
        placeholder="…or type your own occasion"
        className="w-full rounded-2xl px-4 py-3.5 text-[14px] font-semibold outline-none mb-6"
        style={{ background: "#fff", border: "1.5px solid #EFE3F0", color: "#6E6480" }} />

      {/* Not enough pieces after a generate attempt */}
      {tried && !generating && outfits.length === 0 && (
        <div className="rounded-3xl p-6 text-center" style={{ background: "#FCEDE6" }}>
          <div className="w-16 h-16 rounded-3xl mx-auto flex items-center justify-center mb-3" style={{ background: "#ffffffcc" }}>
            <CameraIcon size={28} color="#CC8567" />
          </div>
          <div className="text-[15px] font-black mb-1" style={{ color: "#5A5167" }}>Not enough pieces yet</div>
          <p className="text-[13px] font-semibold" style={{ color: "#A99FB5" }}>
            Add at least a top and a bottom in the Camera tab, then generate again.
          </p>
        </div>
      )}

      {/* Empty state — fills space before generating */}
      {outfits.length === 0 && !generating && !tried && (
        <div className="rounded-3xl p-7 text-center" style={{ background: "linear-gradient(160deg,#FDE9F1,#F1ECFB)" }}>
          <div className="w-20 h-20 rounded-3xl mx-auto flex items-center justify-center mb-4" style={{ background: "#ffffffcc" }}>
            <Sparkles size={38} color="#C56B96" />
          </div>
          <div className="text-[18px] font-black mb-1" style={{ color: "#5A5167" }}>Ready when you are</div>
          <p className="text-[13.5px] font-semibold leading-relaxed mb-5" style={{ color: "#A99FB5" }}>
            Pick an occasion above, then tap Generate Outfits to get five looks styled from your closet.
          </p>
          <div className="grid grid-cols-3 gap-2.5">
            {[
              { label: "Curated", icon: Shirt },
              { label: "Weather-aware", icon: Cloud },
              { label: "Your vibe", icon: Heart },
            ].map((f, i) => {
              const p = PASTELS[i % PASTELS.length];
              const Icon = f.icon;
              return (
                <div key={f.label} className="rounded-2xl py-4 flex flex-col items-center gap-2" style={{ background: "#ffffffaa" }}>
                  <div className="w-10 h-10 rounded-2xl flex items-center justify-center" style={{ background: p.bg }}>
                    <Icon size={20} color={p.text} />
                  </div>
                  <span className="text-[11px] font-extrabold" style={{ color: "#6E6480" }}>{f.label}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Results */}
      {outfits.length > 0 && (
        <div className="mt-6 space-y-4">
          <div className="flex items-center gap-2 flex-wrap">
            <h2 className="text-lg font-black" style={{ color: "#5A5167" }}>Your {outfits.length} look{outfits.length !== 1 ? "s" : ""}</h2>
            {aiMode && (
              <span className="inline-flex items-center gap-1 text-[10.5px] font-extrabold px-2.5 py-1 rounded-full" style={{ background: "#EDE7FB", color: "#8E78C0" }}>
                <Sparkles size={11} /> Styled by AI
              </span>
            )}
          </div>
          {outfits.map((o) => (
            <OutfitCard key={o.id} o={o} fav={favIds.has(o.id)} rating={ratings[o.id] || 0}
              baseLabel={prefs?.baseStyle === "Korean" ? "Korean" : "Cali"}
              onFav={toggleFav} onRate={handleRate} onDismiss={handleDismiss} />
          ))}
        </div>
      )}

      {/* FAB */}
      <div className="fixed left-0 right-0 flex justify-center pointer-events-none" style={{ bottom: 92, maxWidth: 430, margin: "0 auto" }}>
        <button onClick={generate} disabled={generating}
          className="pointer-events-auto flex items-center gap-2 px-7 py-4 rounded-full font-black text-white text-[16px] active:scale-95 transition-transform"
          style={{ background: "linear-gradient(135deg,#FBB8D2,#D6B5F0)", boxShadow: "0 12px 30px -6px #F3B6D0aa, 0 4px 10px #00000015" }}>
          {generating ? <Loader2 size={22} className="animate-spin" /> : <Sparkles size={22} />}
          {generating ? "Styling…" : "Generate Outfits"}
        </button>
      </div>
    </div>
  );
}

/* A closet item card: TAP to open its detail view, SWIPE left to reveal delete. */
function ClosetItemRow({ item, onTrash, onToggleWash, onToggleFav, onOpen }) {
  const REVEAL = 84;
  const [open, setOpen] = useState(false);
  const [drag, setDrag] = useState(null);   // live offset (px, negative) while dragging
  const startX = useRef(null);
  const base = useRef(0);
  const cur = useRef(0);
  const moved = useRef(false);
  const p = PASTELS[item.name.length % 5];

  const down = (e) => {
    startX.current = e.clientX; base.current = open ? -REVEAL : 0; cur.current = base.current; moved.current = false;
    setDrag(base.current);
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
  };
  const mv = (e) => {
    if (startX.current == null) return;
    const dxm = e.clientX - startX.current;
    if (Math.abs(dxm) > 6) moved.current = true;
    cur.current = Math.max(-REVEAL, Math.min(0, base.current + dxm));
    setDrag(cur.current);
  };
  const up = () => {
    if (startX.current == null) return;
    setOpen(cur.current < -REVEAL / 2);
    setDrag(null); startX.current = null;
  };
  const tx = drag != null ? drag : (open ? -REVEAL : 0);

  return (
    <div className="relative overflow-hidden rounded-2xl">
      {/* trash reveal */}
      <div className="absolute right-0 top-0 bottom-0 flex items-center justify-center"
        style={{ background: "#FAD4D4", width: REVEAL }}>
        <button onClick={() => onTrash(item.id)} className="flex flex-col items-center gap-0.5 px-2">
          <Trash2 size={20} color="#D96A6A" />
          <span className="text-[10px] font-extrabold" style={{ color: "#D96A6A" }}>Delete</span>
        </button>
      </div>
      <div className="flex items-center gap-3 p-3"
        style={{ background: "#fff", border: "1.5px solid #F1E6F1", touchAction: "pan-y",
          transform: `translateX(${tx}px)`, transition: drag == null ? "transform .22s cubic-bezier(.2,.8,.2,1)" : "none" }}
        onPointerDown={down} onPointerMove={mv} onPointerUp={up} onPointerCancel={up}
        onClick={() => { if (moved.current) return; if (open) setOpen(false); else if (onOpen) onOpen(item); }}>
        <div className="rounded-2xl flex items-center justify-center shrink-0 overflow-hidden"
          style={{ width: 52, height: 52, background: p.bg }}>
          {item.photo
            ? <img src={item.photo} alt="" className="w-full h-full object-cover" />
            : <CatIcon category={item.category} size={22} color={p.text} />}
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-[15px] font-extrabold truncate" style={{ color: "#5A5167" }}>{item.name}</div>
          <div className="text-[12px] font-semibold" style={{ color: "#A99FB5" }}>{item.color}</div>
        </div>
        <button onClick={(e) => { e.stopPropagation(); if (moved.current) return; onToggleWash(item.id); }}
          className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: item.wash ? "#E6F2FB" : "#F4EEF5" }}>
          <WashingMachine size={17} color={item.wash ? "#5D87A8" : "#C6BCD2"} />
        </button>
        <button onClick={(e) => { e.stopPropagation(); if (moved.current) return; onToggleFav(item.id); }}
          className="w-9 h-9 rounded-xl flex items-center justify-center" style={{ background: item.fav ? "#FDE9F1" : "#F4EEF5" }}>

}

/* ---------- Reusable camera hook ---------- */
function useCamera(active = true) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [camState, setCamState] = useState("starting"); // starting | live | denied | unavailable
  const [facing, setFacing] = useState("environment"); // "environment" (back) | "user" (front)

  const stopStream = () => {
    if (streamRef.current) {
      streamRef.current.getTracks().forEach((t) => t.stop());
      streamRef.current = null;
    }
  };

  const startCamera = async (mode) => {
    const want = mode || facing;
    setCamState("starting");
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setCamState("unavailable");
      return;
    }
    stopStream();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: want } },
        audio: false,
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play().catch(() => {});
      }
      setCamState("live");
    } catch (err) {
      setCamState(err && err.name === "NotAllowedError" ? "denied" : "unavailable");
    }
  };

  const flipCamera = () => {
    const next = facing === "environment" ? "user" : "environment";
    setFacing(next);
    startCamera(next);
  };

  useEffect(() => {
    if (active) startCamera(); else stopStream();
    return stopStream;
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [active]);

  // Re-wire the <video> to the stream if it remounts into view
  useEffect(() => {
    if (camState === "live" && videoRef.current && streamRef.current && !videoRef.current.srcObject) {
      videoRef.current.srcObject = streamRef.current;
      videoRef.current.play().catch(() => {});
    }
  });

  // Capture current frame cropped to 3:4, returns a jpeg data URL (or null)
  const capture = () => {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (camState === "live" && video && canvas && video.videoWidth) {
      const vw = video.videoWidth, vh = video.videoHeight;
      const targetRatio = 3 / 4;
      let sw = vw, sh = vw / targetRatio;
      if (sh > vh) { sh = vh; sw = vh * targetRatio; }
      const sx = (vw - sw) / 2, sy = (vh - sh) / 2;
      canvas.width = 600; canvas.height = 800;
      canvas.getContext("2d").drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL("image/jpeg", 0.85);
    }
    return null;
  };

  return { videoRef, canvasRef, camState, facing, startCamera, flipCamera, capture, stopStream };
}

function CameraTab({ onAdd, active, initialPhoto, onConsumeInitial, corrections, onCorrect }) {
  const { videoRef, canvasRef, camState, facing, startCamera, flipCamera, capture } = useCamera(active);
  const fileRef = useRef(null);
  const [scanning, setScanning] = useState(false);
  const [stage, setStage] = useState("");
  const [photo, setPhoto] = useState(null);   // displayed data URL
  const [results, setResults] = useState(null); // [{name, category, subcategory, color, photo}]
  const [error, setError] = useState(null);
  const [picker, setPicker] = useState(null); // index of the item whose category picker is open
  const [colorPicker, setColorPicker] = useState(null); // index of the item whose color picker is open
  const [loadPct, setLoadPct] = useState(0);
  // The model loaders report progress per-FILE, so the raw number jumps backward
  // between files. Clamp it to never decrease, and ignore sub-1% wiggle, so the
  // bar climbs smoothly instead of flickering between numbers.
  useEffect(() => onModelProgress((p) => setLoadPct((prev) => {
    const next = Math.max(prev, p);
    return Math.round(next * 100) === Math.round(prev * 100) ? prev : next;
  })), []);

  const setItemCategory = (i, category, subcategory) => {
    const sub = category === "Accessories" ? (subcategory || (results && results[i] && results[i].subcategory) || "Jewelry") : null;
    setResults((rs) => rs.map((r, j) => j === i ? { ...r, category, subcategory: sub } : r));
    const it = results && results[i];
    if (it && onCorrect) onCorrect(it.noun || it.name, category, sub);   // teach this fix for next time
  };

  // Add the current photo as an item the detector didn't find (jewelry, hairclips, …).
  const addManual = () => {
    const idx = (results || []).length;
    setResults((rs) => [...(rs || []), { name: "New Item", category: "Accessories", subcategory: "Jewelry", color: "Neutral", photo }]);
    setError(null);
    setPicker(idx);
  };

  const removeItem = (i) => setResults((rs) => { const next = (rs || []).filter((_, j) => j !== i); return next.length ? next : null; });
  const renameItem = (i, name) => setResults((rs) => rs.map((r, j) => j === i ? { ...r, name } : r));
  const setItemColor = (i, color) => setResults((rs) => rs.map((r, j) => j === i ? { ...r, color } : r));

  // Auto-scan a photo handed in from onboarding ("Snap your closet").
  useEffect(() => {
    if (initialPhoto) { processImage(initialPhoto); onConsumeInitial && onConsumeInitial(); }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [initialPhoto]);

  const processImage = async (dataUrl) => {
    setPhoto(dataUrl);
    setResults(null);
    setError(null);
    setScanning(true);
    setStage("Getting ready…");
    try {
      const ds = await downscaleDataUrl(dataUrl, 1000);
      const { items, annotated } = await detectGarments(ds, setStage, corrections, dataUrl);
      setResults(items);
      if (annotated) setPhoto(annotated); // show the labeled boxes over the photo
      if (!items.length) setError("No items found — make sure the WHOLE item is in the frame and step back a bit. A close-up of just part of an item won't be recognized.");
    } catch (e) {
      setError((e && e.message) || "Something went wrong while scanning.");
    } finally {
      setScanning(false);
    }
  };

  const snap = () => {
    const d = capture();
    if (!d) { setError("Couldn't capture from the camera — try Upload instead."); return; }
    processImage(d);
  };

  const onFile = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => processImage(reader.result);
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const confirmAll = () => {
    (results || []).forEach((r) => onAdd({ name: r.name, category: r.category, subcategory: r.subcategory || null, color: r.color, photo: r.photo, id: uid(), fav: false, wash: false }));
    setResults(null);
    setPhoto(null);
    setError(null);
    setPicker(null);
  };

  const retake = () => {
    setResults(null);
    setPhoto(null);
    setError(null);
  };

  return (
    <div className="pb-28">
      <h1 className="text-[34px] leading-tight font-black mb-2" style={{ color: "#5A5167" }}>Take a picture to add to closet</h1>
      <p className="text-[13.5px] font-semibold mb-2" style={{ color: "#A99FB5" }}>
        Take a picture of your clothes — step back and ensure your clothes are mostly visible.
      </p>

      {/* Viewfinder */}
      <div className="relative rounded-3xl overflow-hidden mb-7 mt-6"
        style={{ aspectRatio: "3/4", background: "linear-gradient(160deg,#2b2b33,#3d3a44)" }}>

        {/* live video (hidden once a photo is frozen) */}
        <video ref={videoRef} playsInline muted
          className="absolute inset-0 w-full h-full object-cover"
          style={{ display: camState === "live" && !photo ? "block" : "none" }} />
