  const [styleOpen, setStyleOpen] = useState(false);
  const toggle = (a) =>
    setAesthetics(aesthetics.includes(a) ? aesthetics.filter((x) => x !== a) : [...aesthetics, a]);

  const [aiKeyInput, setAiKeyInput] = useState(getAiKey());
  const [showKey, setShowKey] = useState(false);
  const aiOn = !!aiKeyInput.trim();
  const saveKey = (v) => { setAiKeyInput(v); setAiKey(v); };

  return (
    <div className="pb-28">
      <h1 className="text-[34px] leading-tight font-black mb-5" style={{ color: "#5A5167" }}>Profile</h1>

      {/* My Style — tap to open the board of styles you've loved */}
      <button onClick={() => setStyleOpen((o) => !o)}
        className="w-full text-left rounded-3xl p-5 mb-3 flex items-center gap-4 active:scale-[0.99] transition-transform"
        style={{ background: "linear-gradient(120deg,#FDE9F1,#F1ECFB)" }}>
        <div className="w-16 h-16 rounded-2xl overflow-hidden flex items-center justify-center shrink-0" style={{ background: "#ffffffcc" }}>
          {closetPhoto ? <img src={closetPhoto} alt="" className="w-full h-full object-cover" /> : <User size={30} color="#C56B96" />}
        </div>
        <div className="flex-1 min-w-0">
          <div className="text-[18px] font-black" style={{ color: "#5A5167" }}>My Style</div>
          <div className="text-[13px] font-bold" style={{ color: "#A99FB5" }}>
            {plural(closetCount, "piece")} · {plural(aesthetics.length, "aesthetic")} · {favorites.length} saved
          </div>
        </div>
        <ChevronDown size={22} color="#C99BB5" style={{ transform: styleOpen ? "rotate(180deg)" : "none", transition: "transform .25s" }} />
      </button>

      {/* style board */}
      {styleOpen && (
        <div className="rounded-3xl p-4 mb-6" style={{ background: "#fff", border: "1.5px solid #F1E6F1" }}>
          <p className="text-[12.5px] font-bold mb-3 flex items-start gap-1.5" style={{ color: "#A99FB5" }}>
            <Star size={13} color="#C99BB5" fill="#C99BB5" className="mt-0.5 shrink-0" />
            <span>Rate a look {STYLE_STARS}★ or higher in the Stylist and its aesthetic joins your style automatically{ratedCount ? ` · ${ratedCount} look${ratedCount !== 1 ? "s" : ""} rated so far` : ""}.</span>
          </p>

          <div className="text-[13px] font-black mb-2" style={{ color: "#6E6480" }}>Styles you've loved</div>
          {loved.length ? (
            <div className="flex flex-wrap gap-2">
              {loved.map((a, i) => {
                const p = PASTELS[i % PASTELS.length];
                return (
                  <span key={a} className="px-4 py-2 rounded-full text-[14px] font-extrabold flex items-center gap-1.5" style={{ background: p.bg, color: p.text }}>
                    <Star size={13} fill={p.text} color={p.text} /> {a}
                  </span>
                );
              })}
            </div>
          ) : (
            <p className="text-[13px] font-semibold rounded-2xl p-3" style={{ color: "#A99FB5", background: "#FAF3FA" }}>
              No loved styles yet — rate looks {STYLE_STARS}★ or higher in the Stylist and the styles you love will collect here.
            </p>
          )}

          {aesthetics.length > 0 && (
            <>
              <div className="text-[13px] font-black mt-4 mb-2" style={{ color: "#6E6480" }}>Your full style mix</div>
              <div className="flex flex-wrap gap-2">
                {aesthetics.map((a, i) => {
                  const p = PASTELS[i % PASTELS.length];
                  return <span key={a} className="px-4 py-2 rounded-full text-[14px] font-extrabold" style={{ background: p.bg, color: p.text }}>{a}</span>;
                })}
              </div>
            </>
          )}
        </div>
      )}

      {/* aesthetics editor */}
      <label className="text-[19px] font-black tracking-wide block" style={{ color: "#6E6480" }}>My Aesthetics</label>
      <p className="text-[13px] font-semibold mt-1 mb-3" style={{ color: "#B8AFC6" }}>Tap to add or remove — pick as many as you like.</p>
      <div className="flex flex-wrap gap-2.5">
        {AESTHETICS.map((a, i) => {
          const on = aesthetics.includes(a);
          const p = PASTELS[i % PASTELS.length];
          return (
            <button key={a} onClick={() => toggle(a)}
              className="px-5 py-3 rounded-full text-[15px] font-extrabold active:scale-95 transition-all flex items-center gap-1.5"
              style={{
                background: on ? p.bg : "#F6EEF6",
                color: on ? p.text : "#A99FB5",
                transform: on ? "scale(1.03)" : "scale(1)",
              }}>
              {on && <Check size={15} />}
              {a}
            </button>
          );
        })}
      </div>

      {aesthetics.length === 0 && (
        <p className="text-[13px] font-bold mt-4" style={{ color: "#C99BB5" }}>
          Pick at least one aesthetic so your Stylist looks stay on-vibe.
        </p>
      )}

      {/* base style */}
      <label className="text-[19px] font-black tracking-wide block mt-8" style={{ color: "#6E6480" }}>Base Style</label>
      <p className="text-[13px] font-semibold mt-1 mb-3" style={{ color: "#B8AFC6" }}>The foundation every look is built on.</p>
      <div className="flex gap-2.5">
        {["Cali", "Korean"].map((k) => {
          const on = baseStyle === k;
          return (
            <button key={k} onClick={() => setBaseStyle(k)}
              className="flex-1 py-3 rounded-2xl text-[15px] font-extrabold active:scale-95 transition-all flex items-center justify-center gap-1.5"
              style={{ background: on ? "#FDE9F1" : "#F6EEF6", color: on ? "#C56B96" : "#A99FB5", outline: on ? "2px solid #F3A7CB" : "2px solid transparent" }}>
              {on && <Check size={15} />}{k}
            </button>
          );
        })}
      </div>

      <div className="mt-2.5 rounded-2xl p-3.5" style={{ background: baseStyle === "Korean" ? "#F1ECFB" : "#FFF6DE" }}>
        <div className="text-[13px] font-bold leading-relaxed" style={{ color: baseStyle === "Korean" ? "#8E78C0" : "#C39A3E" }}>
          {baseStyle === "Korean"
            ? "Clean, trend-forward, polished — crisp lines and thoughtful proportions for that put-together Korean-street look."
            : "Sun-washed, relaxed, easy — effortless, beachy California basics with an undone ease."}
        </div>
      </div>

      {/* try new aesthetics toggle */}
      <div className="mt-6 flex items-center justify-between rounded-3xl p-4" style={{ background: "#F6EEF6" }}>
        <div className="pr-3">
          <div className="text-[18px] font-black" style={{ color: "#5A5167" }}>Try new outfit aesthetics</div>
          <div className="text-[12.5px] font-semibold mt-0.5" style={{ color: "#A99FB5" }}>
            {tryNew ? "1–2 of your 5 looks will explore something new" : "Leaving this off keeps all generated outfits your preferred vibe"}
          </div>
        </div>
        <button onClick={() => setTryNew(!tryNew)} aria-label="toggle try new aesthetics"
          className="w-14 h-8 rounded-full p-1 shrink-0 transition-all"
          style={{ background: tryNew ? "#F3A7CB" : "#DDD0E6" }}>
          <div className="w-6 h-6 rounded-full bg-white shadow transition-all" style={{ transform: tryNew ? "translateX(24px)" : "translateX(0)" }} />
        </button>
      </div>

      {/* AI stylist */}
      <label className="text-[19px] font-black tracking-wide block mt-8 flex items-center gap-2" style={{ color: "#6E6480" }}>
        <Sparkles size={17} color="#8E78C0" /> AI Stylist
      </label>
      <p className="text-[13px] font-semibold mt-1 mb-3" style={{ color: "#B8AFC6" }}>
        Add your own Anthropic API key to have outfits composed by AI with current social-media fashion sense. Without a key, the built-in stylist is used.
      </p>
      <div className="rounded-3xl p-4" style={{ background: "#F6EEF6" }}>
        <div className="flex items-center gap-2">
          <input
            type={showKey ? "text" : "password"}
            value={aiKeyInput}
            onChange={(e) => saveKey(e.target.value)}
            placeholder="sk-ant-…"
            autoComplete="off" autoCorrect="off" spellCheck={false}
            className="flex-1 rounded-2xl px-3.5 py-3 text-[13px] font-semibold outline-none"
            style={{ background: "#fff", border: "1.5px solid #EFE3F0", color: "#6E6480" }} />
          <button onClick={() => setShowKey((s) => !s)}
            className="px-3 py-3 rounded-2xl text-[12px] font-extrabold shrink-0"
            style={{ background: "#fff", border: "1.5px solid #EFE3F0", color: "#8A7FA0" }}>
            {showKey ? "Hide" : "Show"}
          </button>
        </div>
        <div className="flex items-center justify-between mt-2.5">
          <div className="text-[12px] font-bold flex items-center gap-1.5" style={{ color: aiOn ? "#7BAE83" : "#A99FB5" }}>
            <span className="w-2 h-2 rounded-full" style={{ background: aiOn ? "#7BAE83" : "#C6BCD2" }} />
            {aiOn ? "AI stylist on" : "AI stylist off"}
          </div>
          {aiOn && (
            <button onClick={() => saveKey("")} className="text-[12px] font-bold" style={{ color: "#C99BB5" }}>Remove key</button>
          )}
        </div>
        <p className="text-[11.5px] font-semibold mt-2.5 leading-relaxed" style={{ color: "#B8AFC6" }}>
          Your key is stored only in this browser and sent straight to Anthropic — never to us. Get one at console.anthropic.com (usage costs a few cents). Use a key with a low spend limit.
        </p>
      </div>

      {/* favorited outfits */}
      <label className="text-[19px] font-black tracking-wide block mt-8" style={{ color: "#6E6480" }}>Favorited Outfits</label>
      <p className="text-[13px] font-semibold mt-1 mb-3" style={{ color: "#B8AFC6" }}>
        {favorites.length > 0
          ? "Looks you loved — the Stylist leans into these when you generate."
          : "Tap the heart on any look in the Stylist tab to save it here."}
      </p>

      {favorites.length === 0 ? (
        <div className="rounded-3xl p-8 text-center" style={{ background: "linear-gradient(160deg,#FDE9F1,#F1ECFB)" }}>
          <div className="w-16 h-16 rounded-3xl mx-auto flex items-center justify-center mb-3" style={{ background: "#ffffffcc" }}>
            <Heart size={28} color="#C56B96" />
          </div>
          <div className="text-[15px] font-black" style={{ color: "#5A5167" }}>No favorites yet</div>
          <p className="text-[13px] font-semibold mt-1" style={{ color: "#A99FB5" }}>Your saved looks will live here.</p>
        </div>
      ) : (
        <div className="grid grid-cols-2 gap-3">
          {favorites.map((o, i) => {
            const p = PASTELS[i % PASTELS.length];
            return (
              <div key={o.id} className="rounded-3xl overflow-hidden" style={{ background: p.bg }}>
                <div className="relative" style={{ height: 150, background: p.ring + "55" }}>
                  <FavThumb img={o.img} pastel={p} />
                  <button onClick={() => toggleFav(o)}
                    className="absolute top-2 right-2 w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-transform"
                    style={{ background: "#ffffffdd" }}>
                    <Heart size={15} color={p.text} fill={p.text} />
                  </button>
                </div>
                <div className="p-3">
                  <div className="text-[14px] font-black leading-tight" style={{ color: p.text }}>{o.title}</div>
                  <div className="text-[11px] font-bold mt-0.5" style={{ color: p.text + "bb" }}>{o.aesthetic}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FavThumb({ img, pastel }) {
  const [failed, setFailed] = useState(false);
  if (img && !failed) {
    return <img src={img} alt="" onError={() => setFailed(true)} className="absolute inset-0 w-full h-full object-cover" />;
  }
  return (
    <div className="absolute inset-0 flex items-center justify-center">
      <Shirt size={36} color={pastel.text} />
    </div>
  );
}

/* ================= ROOT ================= */
function App() {
  const [hydrated, setHydrated] = useState(false);   // loaded saved state from IndexedDB yet?
  const [onboarded, setOnboarded] = useState(false);
  const [prefs, setPrefs] = useState({ aesthetics: [], closetPhoto: null, baseStyle: "Cali", tryNew: false, feedback: emptyFeedback() });
  const [tab, setTab] = useState("stylist");
  const [pendingPhoto, setPendingPhoto] = useState(null); // onboarding photo to auto-scan
  const [weather, setWeather] = useState(null);
  const [closet, setCloset] = useState(SEED);
  const [trash, setTrash] = useState(SEED_TRASH);
  const [favorites, setFavorites] = useState([]);
  const [toast, setToast] = useState("");

  // Load saved state from IndexedDB once (falling back to a one-time migration of
  // the old localStorage build), then start persisting changes.
  useEffect(() => {
    (async () => {
      let saved = await idbGet(STATE_KEY);
      if (!saved) {
        const legacy = loadLegacyState();
        if (legacy) { saved = legacy; idbSet(STATE_KEY, legacy); try { localStorage.removeItem(STATE_LS); } catch (e) {} }
      }
      if (saved) {
        setOnboarded(!!saved.onboarded);
        if (saved.prefs) setPrefs({ aesthetics: [], closetPhoto: null, baseStyle: "Cali", tryNew: false, feedback: emptyFeedback(), ...saved.prefs });
        if (saved.closet) setCloset(saved.closet);
        if (saved.trash) setTrash(saved.trash);
        if (saved.favorites) setFavorites(saved.favorites);
      }
      setHydrated(true);
    })();
  }, []);

  // Persist wardrobe + learning whenever they change (after the initial load, so
  // we never overwrite saved data with the starting defaults).
  useEffect(() => {
    if (!hydrated) return;
    const t = setTimeout(() => { idbSet(STATE_KEY, { onboarded, prefs, closet, trash, favorites }); }, 300);
    return () => clearTimeout(t);
  }, [hydrated, onboarded, prefs, closet, trash, favorites]);

  // Record a star rating: update aesthetic + item scores, and promote the look's
  // aesthetic into the user's style once it's rated STYLE_STARS or higher.
  const rateOutfit = (outfit, stars) => {
    const a = bareAesthetic(outfit.aesthetic);
    const ids = (outfit.items || []).map((i) => i.id);
    let promoted = false;
    setPrefs((p) => {
      const fb = p.feedback || emptyFeedback();
      const prev = fb.ratings[outfit.id];
      const w = (s) => s - 3;                 // 4–5 ⇒ positive, 1–2 ⇒ negative
      const undo = prev ? w(prev) : 0;
      const aesthetic = { ...fb.aesthetic }, item = { ...fb.item };
      if (a) aesthetic[a] = (aesthetic[a] || 0) - undo + w(stars);
      ids.forEach((id) => { item[id] = (item[id] || 0) - undo * 0.5 + w(stars) * 0.5; });
      let aesthetics = p.aesthetics;
      if (stars >= STYLE_STARS && a && AESTHETICS.includes(a) && !aesthetics.includes(a)) {
        aesthetics = [...aesthetics, a]; promoted = true;
      }
      return { ...p, aesthetics, feedback: { ...fb, ratings: { ...fb.ratings, [outfit.id]: stars }, aesthetic, item } };
    });
    showToast(promoted ? `${a} added to your style ★` : "Thanks — learning your taste");
  };

  // Remember a manual category fix (keyed by garment type) so the same correction
  // is auto-applied to that type on every future scan.
  const recordCorrection = (noun, category, subcategory) => {
    const key = (noun || "").toLowerCase().trim();
    if (!key) return;
    setPrefs((p) => {
      const fb = p.feedback || emptyFeedback();
      return { ...p, feedback: { ...fb, corrections: { ...(fb.corrections || {}), [key]: { category, subcategory: subcategory || null } } } };
    });
  };

  // Swipe-away = a soft downvote for that look's aesthetic + items.
  const dismissOutfit = (outfit) => {
    const a = bareAesthetic(outfit.aesthetic);
    const ids = (outfit.items || []).map((i) => i.id);
    setPrefs((p) => {
      const fb = p.feedback || emptyFeedback();
      const aesthetic = { ...fb.aesthetic }, item = { ...fb.item };
      if (a) aesthetic[a] = (aesthetic[a] || 0) - 1;
      ids.forEach((id) => { item[id] = (item[id] || 0) - 0.5; });
      return { ...p, feedback: { ...fb, aesthetic, item } };
    });
  };

  const toggleFav = (outfit) => {
    setFavorites((prev) => {
      if (prev.some((f) => f.id === outfit.id)) {
        return prev.filter((f) => f.id !== outfit.id);
      }
      showToast(`${outfit.title} saved to favorites`);
      // store a clean copy (drop transient render fields)
      const { pastel, familiar, ...clean } = outfit;
      return [clean, ...prev];
    });
  };

  useEffect(() => {
    const id = "nunito-font";
    if (!document.getElementById(id)) {
      const l = document.createElement("link");
      l.id = id; l.rel = "stylesheet";
      l.href = "https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap";
      document.head.appendChild(l);
    }
    const s = document.createElement("style");
    s.textContent = `@keyframes scan{0%{top:0}100%{top:100%}}`;
    document.head.appendChild(s);

    // Warm up BOTH AI models in the background (in parallel) the moment the app
    // opens — they download while you're in onboarding, so the first scan is fast.
    (async () => {
      try { await Promise.allSettled([getDetector(), getClassifier()]); } catch (e) { /* ignore */ }
    })();

    // Pull the real local weather (asks for location; falls back to IP).
    fetchWeather().then((w) => { if (w) setWeather(w); }).catch(() => {});
  }, []);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(""), 1800); };

  const addItem = (item) => {
    setCloset((c) => [item, ...c]);
    showToast(`${item.name} added to closet`);
    setTab("closet");
  };

  const TABS = [
    { key: "stylist", label: "Stylist", icon: Sparkles },
    { key: "closet", label: "Closet", icon: Shirt },
    { key: "camera", label: "Camera", icon: CameraIcon },
    { key: "profile", label: "Profile", icon: User },
  ];

  const setAesthetics = (next) => setPrefs((p) => ({ ...p, aesthetics: next }));
  const setTryNew = (v) => setPrefs((p) => ({ ...p, tryNew: v }));
  const setBaseStyle = (v) => setPrefs((p) => ({ ...p, baseStyle: v }));

  const finishOnboarding = (data) => {
    setPrefs((p) => ({ ...p, ...data }));
    setOnboarded(true);
    // If they snapped a closet photo, run it through detection right away.
    if (data.closetPhoto) { setPendingPhoto(data.closetPhoto); setTab("camera"); }
  };

  if (!hydrated) {
    // Brief splash while we load the saved wardrobe so we don't flash onboarding.
    return (
      <div style={{ fontFamily: "'Nunito', sans-serif", background: "linear-gradient(180deg,#FDF1F6,#F1F4FC)", minHeight: "100vh" }}
        className="flex items-center justify-center">
        <Loader2 size={34} className="animate-spin" color="#E891B5" />
      </div>
    );
  }

  if (!onboarded) {
    return <Onboarding onDone={finishOnboarding} />;
  }

  return (
    <div style={{ fontFamily: "'Nunito', sans-serif", background: "linear-gradient(180deg,#FDF1F6,#F1F4FC)", minHeight: "100vh" }}>
      <div className="mx-auto relative" style={{ maxWidth: 430, minHeight: "100vh", background: "linear-gradient(180deg,#FFFCFE,#FBFAFF)" }}>
        <div className="px-5 pt-8">
          {tab === "stylist" && <StylistTab closet={closet} favorites={favorites} toggleFav={toggleFav} prefs={prefs} weather={weather} onRate={rateOutfit} onDismiss={dismissOutfit} />}
          {tab === "closet" && (
            <ClosetTab closet={closet} setCloset={setCloset} trash={trash} setTrash={setTrash} goCamera={() => setTab("camera")} />
          )}
          {/* Camera stays mounted (just hidden) so a taken photo + AI loading aren't lost when you switch tabs. */}
          <div style={{ display: tab === "camera" ? "block" : "none" }}>
            <CameraTab onAdd={addItem} active={tab === "camera"} initialPhoto={pendingPhoto} onConsumeInitial={() => setPendingPhoto(null)} corrections={prefs.feedback && prefs.feedback.corrections} onCorrect={recordCorrection} />
          </div>
          {tab === "profile" && (
            <ProfileTab aesthetics={prefs.aesthetics} setAesthetics={setAesthetics} closetCount={closet.length} closetPhoto={prefs.closetPhoto} favorites={favorites} toggleFav={toggleFav} tryNew={prefs.tryNew} setTryNew={setTryNew} baseStyle={prefs.baseStyle} setBaseStyle={setBaseStyle} feedback={prefs.feedback} />
          )}
        </div>

        <Toast msg={toast} />

        {/* Bottom nav */}
        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full" style={{ maxWidth: 430 }}>
          <div className="flex justify-around items-center px-2 py-3 mx-3 mb-3 rounded-3xl"
            style={{ background: "#fff", border: "1.5px solid #F1E6F1", boxShadow: "0 -2px 20px -8px #00000018" }}>
            {TABS.map((t) => {
              const Icon = t.icon;
              const active = tab === t.key;
              return (
                <button key={t.key} onClick={() => setTab(t.key)}
                  className="flex flex-col items-center gap-1 px-3.5 py-1 rounded-2xl transition-all"
                  style={{ background: active ? "#FDE9F1" : "transparent" }}>
                  <Icon size={22} color={active ? "#E891B5" : "#C6BCD2"} fill={active && t.key === "stylist" ? "#E891B5" : "none"} />
                  <span className="text-[11px] font-extrabold" style={{ color: active ? "#E891B5" : "#C6BCD2" }}>{t.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}


const loadingEl = document.getElementById("loading");
if (loadingEl) loadingEl.remove();
createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
